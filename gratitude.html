<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>감사 메시지 · AI 사업본부 타운홀</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Gowun+Dodum&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
  :root{
    --bg-a:#2b1a1c;
    --bg-b:#3c2320;
    --bg-c:#4a2b24;
    --gold:#e3a85c;
    --gold-soft:#f2c98f;
    --rose:#e2836a;
    --ink:#f7ece0;
    --ink-soft:#e0c3ac;
    --card-bg:rgba(255,235,215,0.08);
    --card-border:rgba(227,168,92,0.4);
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0; padding:0; height:100%;
    background:
      radial-gradient(ellipse at 15% 10%, rgba(227,168,92,0.14), transparent 45%),
      radial-gradient(ellipse at 88% 82%, rgba(226,131,106,0.16), transparent 50%),
      linear-gradient(160deg, var(--bg-a) 0%, var(--bg-b) 55%, var(--bg-c) 100%);
    color:var(--ink);
    font-family:'Gowun Dodum', sans-serif;
    overflow:hidden;
    height:100vh;
    width:100vw;
  }

  /* page header */
  .page-head{
    position:fixed; top:0; left:0; right:0;
    text-align:center;
    padding:30px 20px 10px;
    z-index:5;
    pointer-events:none;
  }
  .page-head .eyebrow{
    font-size:0.72rem;
    letter-spacing:0.32em;
    color:var(--gold-soft);
    text-transform:uppercase;
    opacity:0.85;
  }
  .page-head .title{
    font-family:'Noto Serif KR', serif;
    font-weight:700;
    letter-spacing:0.01em;
    font-size:clamp(1.15rem, 2.6vw, 1.7rem);
    color:var(--ink);
    margin-top:8px;
  }
  .page-head .subtitle{
    margin-top:8px;
    font-family:'Noto Serif KR', serif;
    font-weight:600;
    font-size:clamp(1.5rem, 4vw, 2.4rem);
    letter-spacing:0.06em;
    color:var(--gold);
    position:relative;
    display:inline-block;
  }
  .page-head .subtitle::before,
  .page-head .subtitle::after{
    content:"";
    position:absolute;
    top:50%;
    width:34px;
    height:1px;
    background:linear-gradient(90deg, transparent, var(--gold-soft));
    opacity:0.7;
  }
  .page-head .subtitle::before{ right:calc(100% + 14px); }
  .page-head .subtitle::after{ left:calc(100% + 14px); transform:scaleX(-1); }

  /* ambient decorative particles (refined, no hearts) */
  #ambientField{
    position:fixed; inset:0;
    z-index:1;
    overflow:hidden;
    pointer-events:none;
  }
  .deco-mote{
    position:absolute;
    bottom:-6vh;
    animation-name: driftUp;
    animation-timing-function: linear;
    animation-fill-mode: forwards;
    will-change: transform, opacity;
  }
  .deco-mote svg{ display:block; }

  @keyframes driftUp{
    0%   { transform: translate(0,0); opacity:0; }
    10%  { opacity: var(--peak-op, 0.5); }
    50%  { transform: translate(16px,-55vh); }
    90%  { opacity: var(--peak-op, 0.5); }
    100% { transform: translate(-8px,-108vh); opacity:0; }
  }

  /* floating message field */
  #floatField{
    position:fixed; inset:0;
    z-index:2;
    overflow:hidden;
    pointer-events:none;
  }

  .lantern{
    position:absolute;
    bottom:-14vh;
    max-width:min(52vw, 380px);
    padding:20px 26px 20px 46px;
    border-radius:8px;
    background:rgba(250,240,227,0.96);
    border:1px solid rgba(227,168,92,0.55);
    border-left:3px solid var(--gold);
    backdrop-filter: blur(6px);
    box-shadow:0 12px 30px rgba(0,0,0,0.3);
    font-family:'Gowun Dodum', sans-serif;
    color:#3d211b;
    line-height:1.55;
    animation-name: floatUp;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
    will-change: transform, opacity;
  }
  .lantern::before{
    content:"♥";
    position:absolute;
    left:18px; top:20px;
    font-size:1.1em;
    color:var(--rose);
    opacity:0.9;
  }
  .lantern .who{
    display:block;
    margin-top:10px;
    font-size:0.8em;
    letter-spacing:0.04em;
    color:#a8632f;
    opacity:0.9;
  }

  .lantern.depth-1{ font-size:1.15rem; z-index:5; }
  .lantern.depth-2{ font-size:1.02rem; opacity:0.82; z-index:4; }
  .lantern.depth-3{ font-size:0.92rem; opacity:0.6; z-index:3; }

  @keyframes floatUp{
    0%   { transform: translate(0,0); opacity:0; }
    6%   { opacity: var(--peak-op, 0.9); }
    28%  { transform: translate(14px,-30vh); }
    52%  { transform: translate(-12px,-56vh); }
    76%  { transform: translate(10px,-82vh); }
    92%  { opacity: var(--peak-op, 0.9); }
    100% { transform: translate(0,-112vh); opacity:0; }
  }

  /* spotlight */
  #spotlight{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:6;
    pointer-events:none;
  }
  #spotlight .card{
    max-width:min(78vw, 620px);
    text-align:center;
    padding:44px 40px 34px;
    border-radius:4px;
    background:linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.04));
    backdrop-filter: blur(8px);
    box-shadow:0 24px 60px rgba(0,0,0,0.4);
    border:1px solid var(--card-border);
    position:relative;
    opacity:0;
    transform:scale(0.92) translateY(10px);
    transition: opacity 0.5s cubic-bezier(.2,1,.4,1), transform 0.5s cubic-bezier(.2,1,.4,1);
  }
  #spotlight .card::before{
    content:"";
    position:absolute;
    top:0; left:50%;
    transform:translateX(-50%);
    width:44px; height:2px;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  #spotlight .card.show{
    opacity:1;
    transform:scale(1) translateY(0);
  }
  #spotlight .mark{
    font-family:'Noto Serif KR', serif;
    font-size:clamp(1.6rem, 3.6vw, 2.2rem);
    color:var(--gold);
    opacity:0.75;
    line-height:1;
    display:block;
    margin-bottom:6px;
  }
  #spotlight .msg{
    font-family:'Noto Serif KR', serif;
    font-weight:600;
    font-size:clamp(1.25rem, 3.2vw, 1.9rem);
    color:var(--ink);
    line-height:1.5;
    margin-top:6px;
    word-break:keep-word;
  }
  #spotlight .name{
    margin-top:16px;
    font-family:'Gowun Dodum', sans-serif;
    font-size:0.92rem;
    letter-spacing:0.05em;
    color:var(--gold-soft);
  }

  .empty-hint{
    font-family:'Noto Serif KR', serif;
    font-size:clamp(1.05rem, 2.2vw, 1.4rem);
    color:var(--ink-soft);
    text-align:center;
    letter-spacing:0.02em;
  }

  /* composer */
  #composer{
    position:fixed;
    left:50%; bottom:26px;
    transform:translateX(-50%);
    width:min(560px, 92vw);
    z-index:8;
    background:rgba(58,32,29,0.88);
    border:1px solid var(--card-border);
    border-radius:10px;
    box-shadow:0 16px 40px rgba(0,0,0,0.4);
    padding:16px 18px 13px;
    backdrop-filter: blur(10px);
  }
  #composer .row{
    display:flex;
    gap:9px;
  }
  #composer input[type=text],
  #composer textarea{
    font-family:'Gowun Dodum', sans-serif;
    background:rgba(250,240,227,0.96);
    border:1px solid rgba(227,168,92,0.55);
    border-radius:6px;
    padding:10px 12px;
    color:#3d211b;
    outline:none;
  }
  #composer input::placeholder,
  #composer textarea::placeholder{ color:rgba(61,33,27,0.45); }
  #composer textarea{
    flex:1;
    resize:none;
    height:44px;
    line-height:1.35;
    font-size:0.95rem;
  }
  #composer textarea:focus, #composer input:focus{
    border-color:var(--gold);
    background:#ffffff;
  }
  #composer button{
    font-family:'Noto Serif KR', serif;
    font-weight:600;
    font-size:0.92rem;
    letter-spacing:0.03em;
    color:var(--bg-a);
    background:linear-gradient(160deg, var(--gold-soft), var(--gold));
    border:none;
    border-radius:6px;
    padding:0 22px;
    cursor:pointer;
    transition:transform 0.15s ease, filter 0.15s ease;
  }
  #composer button:hover{ filter:brightness(1.06); transform:translateY(-1px); }
  #composer button:active{ transform:translateY(0px) scale(0.98); }
  #composer button:disabled{ opacity:0.5; cursor:default; transform:none; }

  #composer .foot{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:8px;
    font-size:0.7rem;
    letter-spacing:0.02em;
    color:var(--ink-soft);
  }

  @media (max-width:520px){
    #composer .row{ flex-direction:column; }
  }

  @media (prefers-reduced-motion: reduce){
    .lantern, .deco-mote{ animation:none !important; }
    .lantern{ position:static; display:inline-block; margin:6px; opacity:0.9 !important; }
    .deco-mote{ display:none; }
    #spotlight .card{ transition:none; }
  }
</style>
</head>
<body>

  <div class="page-head">
    <div class="title">AI 사업본부 타운홀</div>
    <div class="subtitle">감사 메시지</div>
  </div>

  <div id="ambientField" aria-hidden="true"></div>
  <div id="floatField" aria-hidden="true"></div>

  <div id="spotlight">
    <div class="card" id="spotlightCard">
      <span class="mark">❝</span>
      <div class="msg" id="spotlightMsg"></div>
      <div class="name" id="spotlightName"></div>
    </div>
    <div class="empty-hint" id="emptyHint">첫 감사의 마음을 남겨주세요</div>
  </div>

  <div id="composer">
    <div class="row">
      <textarea id="msgInput" placeholder="오늘, 누구에게 어떤 감사를 전하고 싶나요?" maxlength="90"></textarea>
      <button id="sendBtn">전하기</button>
    </div>
    <div class="foot">
      <span id="countLabel">지금까지 전해진 감사 · 0개</span>
      <span>남기신 메시지는 화면에 함께 표시돼요</span>
    </div>
  </div>

<script>
(function(){
  // ===== Firebase 연결 (adot-townhall-race 프로젝트 재사용) =====
  const firebaseConfig = {
    apiKey: "AIzaSyAwqdsX9-HYr4xcniuD97dY2XIjw1dQ3fk",
    authDomain: "adot-townhall-race.firebaseapp.com",
    databaseURL: "https://adot-townhall-race-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "adot-townhall-race",
    storageBucket: "adot-townhall-race.firebasestorage.app",
    messagingSenderId: "699342448682",
    appId: "1:699342448682:web:4336db8103ffe6e7c13b53"
  };

  let msgsRef = null;
  try{
    firebase.initializeApp(firebaseConfig);
    // race 데이터와 분리된 전용 경로
    msgsRef = firebase.database().ref('gratitude/messages');
  }catch(e){
    console.error('Firebase 초기화 실패 — 메시지가 이 브라우저에만 표시됩니다', e);
  }
  const hasDB = !!msgsRef;

  const floatField = document.getElementById('floatField');
  const ambientField = document.getElementById('ambientField');
  const spotlightCard = document.getElementById('spotlightCard');
  const spotlightMsg = document.getElementById('spotlightMsg');
  const spotlightName = document.getElementById('spotlightName');
  const emptyHint = document.getElementById('emptyHint');
  const msgInput = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');
  const countLabel = document.getElementById('countLabel');

  const MOTE_COLORS = ['#e3a85c','#f2c98f','#e2836a','#f7ddc4'];

  const seenIds = new Set();
  let total = 0;
  let spotlightBusy = false;
  const queue = [];
  const MAX_LANTERNS = 40;

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function updateCount(){
    countLabel.textContent = `지금까지 전해진 감사 · ${total}개`;
  }

  // purely decorative floating motes, unrelated to messages
  function spawnDecoMote(){
    const el = document.createElement('div');
    el.className = 'deco-mote';
    const size = 10 + Math.random() * 14;
    const left = Math.random() * 96;
    const dur = 12 + Math.random() * 12;
    const peakOp = 0.3 + Math.random() * 0.4;
    const color = MOTE_COLORS[Math.floor(Math.random()*MOTE_COLORS.length)];
    el.style.left = left + '%';
    el.style.setProperty('--peak-op', peakOp);
    el.style.animationDuration = dur + 's';
    el.innerHTML = `<svg width="${size}" height="${size}" viewBox="0 0 32 29"><path fill="${color}" d="M16 28.6 2.6 15.7C-1 12.2-.6 6.4 3.6 3.4 7 1 11.7 1.7 14.4 4.8L16 6.7l1.6-1.9C20.3 1.7 25 1 28.4 3.4c4.2 3 4.6 8.8 1 12.3L16 28.6z"/></svg>`;
    el.addEventListener('animationend', () => el.remove());
    ambientField.appendChild(el);
  }
  setInterval(spawnDecoMote, 900);
  for (let i=0;i<8;i++) setTimeout(spawnDecoMote, i*250);

  // shuffle-bag of horizontal lanes so cards spread evenly left-to-right
  // instead of clumping wherever Math.random() happens to land
  const LANES = [5, 17, 29, 41, 53, 65, 77];
  let laneBag = [];
  function nextLane(){
    if (laneBag.length === 0){
      laneBag = LANES.slice();
      for (let i = laneBag.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [laneBag[i], laneBag[j]] = [laneBag[j], laneBag[i]];
      }
    }
    return laneBag.pop();
  }

  function spawnLantern(text, name){
    const depthRoll = Math.random();
    const depthClass = depthRoll < 0.32 ? 'depth-1' : depthRoll < 0.7 ? 'depth-2' : 'depth-3';
    const el = document.createElement('div');
    el.className = `lantern ${depthClass}`;
    const left = Math.min(84, Math.max(3, nextLane() + (Math.random() * 6 - 3)));
    const dur = depthClass === 'depth-1' ? (16 + Math.random()*5)
              : depthClass === 'depth-2' ? (20 + Math.random()*6)
              : (26 + Math.random()*8);
    const peakOp = depthClass === 'depth-1' ? 0.95 : depthClass === 'depth-2' ? 0.8 : 0.55;
    el.style.left = left + '%';
    el.style.setProperty('--peak-op', peakOp);
    el.style.animationDuration = dur + 's';
    el.innerHTML = escapeHtml(text) + (name ? `<span class="who">— ${escapeHtml(name)}</span>` : '');
    floatField.appendChild(el);

    while (floatField.children.length > MAX_LANTERNS) {
      floatField.removeChild(floatField.firstChild);
    }
  }

  function showSpotlight(text, name){
    spotlightBusy = true;
    emptyHint.style.display = 'none';
    spotlightMsg.textContent = text;
    spotlightName.textContent = name ? `— ${name}` : '';
    spotlightCard.classList.remove('show');
    void spotlightCard.offsetWidth;
    requestAnimationFrame(() => spotlightCard.classList.add('show'));

    setTimeout(() => {
      spotlightCard.classList.remove('show');
      setTimeout(() => {
        spawnLantern(text, name);
        spotlightBusy = false;
        processQueue();
      }, 460);
    }, 3200);
  }

  function processQueue(){
    if (spotlightBusy || queue.length === 0) return;
    const next = queue.shift();
    showSpotlight(next.text, next.name);
  }

  function enqueueForSpotlight(text, name){
    total += 1;
    updateCount();
    queue.push({text, name});
    processQueue();
  }

  // ===== 실시간 수신 =====
  // 초기 로드: 기존 메시지는 스포트라이트 없이 곧바로 랜턴으로 표시.
  // 이후 도착분: 스포트라이트 → 랜턴. (폴링 없이 onChildAdded 즉시 반영)
  const INITIAL_WINDOW = 150; // 화면에 되살릴 과거 메시지 수 상한
  let initialLoadDone = false;

  function startRealtime(){
    if (!hasDB) return;
    const query = msgsRef.limitToLast(INITIAL_WINDOW);

    // 1) 기존 메시지 일괄 로드
    query.once('value').then(snap => {
      snap.forEach(child => {
        const data = child.val();
        if (!data || !data.text) return;
        seenIds.add(child.key);
        total += 1;
        spawnLantern(data.text, data.name || '');
      });
      updateCount();
      if (total > 0) emptyHint.style.display = 'none';
      initialLoadDone = true;
    }).catch(e => {
      console.error('감사 인사를 불러오지 못했습니다', e);
      initialLoadDone = true;
    });

    // 2) 신규 메시지 실시간 수신 (내가 보낸 것도 이 경로로 즉시 표시됨)
    query.on('child_added', child => {
      if (seenIds.has(child.key)) return;
      if (!initialLoadDone){
        // once()가 끝나기 전 도착분은 once() 결과에 포함되므로 여기선 대기
        return;
      }
      seenIds.add(child.key);
      const data = child.val();
      if (!data || !data.text) return;
      enqueueForSpotlight(data.text, data.name || '');
    });
  }

  async function submitMessage(){
    const text = msgInput.value.trim();
    if (!text) return;
    if (text.length > 90) return; // maxlength와 이중 방어
    const name = '';

    sendBtn.disabled = true;

    if (hasDB){
      try{
        // push는 로컬에 즉시 반영(child_added) → 스포트라이트가 바로 뜸
        await msgsRef.push({ text, name, ts: firebase.database.ServerValue.TIMESTAMP });
      }catch(e){
        console.error('저장에 실패했어요', e);
        // 저장 실패 시에도 본인 화면에는 표시
        enqueueForSpotlight(text, name);
      }
    } else {
      // Firebase 미연결 폴백: 이 브라우저에서만 표시
      enqueueForSpotlight(text, name);
    }

    msgInput.value = '';
    sendBtn.disabled = false;
    msgInput.focus();
  }

  sendBtn.addEventListener('click', submitMessage);
  msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      submitMessage();
    }
  });

  startRealtime();
  updateCount();
})();
</script>
</body>
</html>
