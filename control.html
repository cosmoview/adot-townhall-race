<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>A.Biz 임원 달리기 · 호스트 컨트롤</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{--bg:#0f1226;--card:#1b2040;--line:#2b3160;--gold:#FFD54A}
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(180deg,#141834,#0d1020);color:#fff;min-height:100vh;
 font-family:'Pretendard',-apple-system,'Malgun Gothic',sans-serif}
.wrap{max-width:560px;margin:0 auto;padding:18px 16px 40px}
.hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.hd h1{font-size:17px;font-weight:900}
.hd .st{font-size:12px;color:#9aa0cc}
.panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px}
.row1{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.phase{font-size:13px;font-weight:800}
.phase.open{color:#57e39a}.phase.closed{color:#ff9e6b}.phase.idle{color:#9aa0cc}.phase.finale{color:var(--gold)}
.tmr{font-size:34px;font-weight:900;font-variant-numeric:tabular-nums}
.qz{font-size:15px;font-weight:700;color:#cfd3f5;margin-top:6px;line-height:1.4;min-height:22px}
.tally{margin-top:14px;display:flex;flex-direction:column;gap:9px}
.tl{display:flex;align-items:center;gap:10px;font-size:13px}
.tl .nm{width:120px;flex:0 0 auto;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar{flex:1;height:14px;background:#12152e;border-radius:7px;overflow:hidden}
.bar>i{display:block;height:100%;background:var(--c);width:0;transition:width .3s}
.cnt{width:34px;text-align:right;font-weight:900;color:var(--gold);font-variant-numeric:tabular-nums}
.troph{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.tc{display:flex;align-items:center;gap:5px;background:#12152e;border:1px solid var(--line);
 border-radius:9px;padding:5px 9px;font-size:12px;font-weight:800}
.tc .d{width:12px;height:12px;border-radius:3px}
.tc .c{color:var(--gold)}
.act{width:100%;padding:20px;border:none;border-radius:16px;font-family:inherit;font-size:20px;font-weight:900;
 color:#0f1226;background:var(--gold);cursor:pointer}
.act.stop{background:#ff6b6b;color:#fff}
.sub{display:flex;gap:10px;margin-top:10px}
.sub button{flex:1;padding:12px;border:1px solid var(--line);border-radius:12px;background:#12152e;color:#c9cdf0;
 font-family:inherit;font-weight:800;font-size:14px;cursor:pointer}
.lock{max-width:420px;margin:80px auto;text-align:center;padding:20px}
.lock input{width:100%;padding:14px;border-radius:12px;border:1px solid var(--line);background:#12152e;color:#fff;
 font-size:16px;font-family:inherit;margin:14px 0}
.lock button{padding:12px 22px;border:none;border-radius:12px;background:var(--gold);color:#0f1226;font-weight:900;font-family:inherit;font-size:15px;cursor:pointer}
.note{font-size:11px;color:#5b608c;margin-top:14px;text-align:center;line-height:1.5}
</style>
</head>
<body>
<div id="root"></div>
<script>
const firebaseConfig={
  apiKey:"AIzaSyAwqdsX9-HYr4xcniuD97dY2XIjw1dQ3fk",
  authDomain:"adot-townhall-race.firebaseapp.com",
  databaseURL:"https://adot-townhall-race-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"adot-townhall-race",
  storageBucket:"adot-townhall-race.firebasestorage.app",
  messagingSenderId:"699342448682",
  appId:"1:699342448682:web:4336db8103ffe6e7c13b53"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const TEAMS=[
 {key:'green', name:'김지훈', title:'AI사업본부장',    color:'#2E9E4F'},
 {key:'red',   name:'장성국', title:'AI서비스개발담당', color:'#D93A3A'},
 {key:'yellow',name:'이정룡', title:'Agent개발담당',    color:'#E0A008'},
 {key:'blue',  name:'윤현상', title:'에이닷기획담당',    color:'#2E74D0'},
 {key:'black', name:'조현덕', title:'에이닷전화담당',    color:'#3A3A3A'},
];
const QUESTIONS=[
 '신입사원 시절 가장 늦게까지 야근 했을 것 같은 임원은?',
 '회식에서 끝까지 자리를 지킬 것 같은 임원은?',
 '길에서 마주치면 커피 사주실 것 같은 임원은?',
 'MZ 밈을 가장 잘 알아들을 것 같은 임원은?',
 '무인도에 딱 한 명 데려간다면? 생존왕 임원은?'
];
const T=Object.fromEntries(TEAMS.map(t=>[t.key,t]));
const ROUND_SECONDS=20;
const HOST_KEY="adot2026"; // 호스트 접속 키 (?key=adot2026)

/* ===== 키 게이트 ===== */
const root=document.getElementById('root');
const urlKey=new URLSearchParams(location.search).get('key');
if(urlKey!==HOST_KEY){
  root.innerHTML=`<div class="lock"><h1>🔒 호스트 전용</h1>
    <input id="k" placeholder="접속 키 입력" />
    <div><button onclick="go()">입장</button></div>
    <div class="note">주소 뒤에 <b>?key=키</b> 를 붙이거나 위에 입력하세요</div></div>`;
  window.go=()=>{location.search='?key='+encodeURIComponent(document.getElementById('k').value.trim());};
}else{ boot(); }

function boot(){
  root.innerHTML=`
   <div class="wrap">
     <div class="hd"><h1>🎮 호스트 컨트롤</h1><div class="st" id="conn">A.Biz 임원 달리기</div></div>
     <div class="panel">
       <div class="row1"><span class="phase" id="ph">—</span><span class="tmr" id="tmr">--</span></div>
       <div class="qz" id="qz"></div>
       <div class="tally" id="tally"></div>
       <div class="troph" id="troph"></div>
     </div>
     <button class="act" id="act">—</button>
     <div class="sub"><button id="pauseBtn" style="display:none">⏸ 일시정지</button><button id="reset">↻ 전체 리셋</button></div>
     <div class="note">라운드는 ${ROUND_SECONDS}초 후 자동 마감됩니다. 이 창은 행사 내내 열어두세요.</div>
   </div>`;

  let state={phase:'idle',roundId:1,endTs:0}, votes={}, trophies={}, votesRef=null, curRound=null;

  db.ref('control/state').on('value',s=>{ state=s.val()||{phase:'idle',roundId:1,endTs:0}; hookVotes(); paint(); });
  db.ref('trophies').on('value',s=>{ trophies=s.val()||{}; paintTroph(); });

  function hookVotes(){
    if(curRound===state.roundId && votesRef) return;
    if(votesRef) votesRef.off();
    curRound=state.roundId;
    votesRef=db.ref(`rounds/${curRound}/votes`);
    votesRef.on('value',s=>{ votes=s.val()||{}; paintTally(); });
  }
  function tally(){const c={};TEAMS.forEach(t=>c[t.key]=0);Object.values(votes).forEach(k=>{if(k in c)c[k]++;});return c;}
  function paintTally(){
    const c=tally();const max=Math.max(1,...Object.values(c));
    document.getElementById('tally').innerHTML=TEAMS.map(t=>`
      <div class="tl" style="--c:${t.color}">
        <span class="nm">${t.name} · ${t.title}</span>
        <span class="bar"><i style="width:${c[t.key]/max*100}%"></i></span>
        <span class="cnt">${c[t.key]}</span></div>`).join('');
  }
  function paintTroph(){
    document.getElementById('troph').innerHTML=TEAMS.map(t=>`
      <span class="tc"><span class="d" style="background:${t.color}"></span>${t.name.slice(0,1)} 🏆<span class="c">${trophies[t.key]||0}</span></span>`).join('');
  }
  function paint(){
    const {phase,roundId}=state;
    const ph=document.getElementById('ph'), act=document.getElementById('act');
    ph.className='phase '+phase;
    ph.textContent={idle:`ROUND ${roundId} · 대기`,open:`ROUND ${roundId} · 진행중`,paused:`ROUND ${roundId} · 일시정지`,closed:`ROUND ${roundId} · 마감`,finale:'시즌 종료'}[phase]||phase;
    document.getElementById('qz').textContent = phase==='finale' ? '' : (QUESTIONS[(roundId||1)-1]||'');
    act.className='act'; const pb=document.getElementById('pauseBtn'); if(pb)pb.style.display='none';
    if(phase==='open'){act.classList.add('stop');act.textContent='■ 지금 마감';act.onclick=()=>closeRound();if(pb){pb.style.display='';pb.textContent='⏸ 일시정지';pb.onclick=()=>pauseRound();}}
    else if(phase==='paused'){act.textContent='▶ 재개';act.onclick=()=>resumeRound();if(pb){pb.style.display='';pb.textContent='■ 지금 마감';pb.onclick=()=>closeRound();}}
    else if(phase==='closed'){
      if(roundId>=5){act.textContent='🏆 최종 결과 발표';act.onclick=()=>db.ref('control/state').update({phase:'finale'});}
      else{act.textContent=`▶ ROUND ${roundId+1} 시작`;act.onclick=()=>startRound(roundId+1);}
    }else if(phase==='finale'){act.textContent='↻ 처음부터';act.onclick=()=>resetAll();}
    else{act.textContent=`▶ ROUND ${roundId||1} 시작`;act.onclick=()=>startRound(roundId||1);}
    paintTally();
  }

  async function startRound(n){
    await db.ref('rounds/'+n).remove();               // 이전 표·결과 초기화
    await db.ref('control/state').set({phase:'open',roundId:n,endTs:Date.now()+ROUND_SECONDS*1000});
  }
  async function pauseRound(){if(state.phase!=='open')return;const remaining=Math.max(0,(state.endTs||0)-Date.now());await db.ref('control/state').update({phase:'paused',remaining});}
  async function resumeRound(){if(state.phase!=='paused')return;await db.ref('control/state').update({phase:'open',endTs:Date.now()+(state.remaining||0)});}
  async function closeRound(){
    const rid=state.roundId;
    const resSnap=await db.ref(`rounds/${rid}/result`).get();
    if(!resSnap.exists()){                              // 이미 채점됐으면 스킵(중복 방지)
      const vs=(await db.ref(`rounds/${rid}/votes`).get()).val()||{};
      const c={};TEAMS.forEach(t=>c[t.key]=0);Object.values(vs).forEach(k=>{if(k in c)c[k]++;});
      let win=TEAMS[0].key,mx=-1;TEAMS.forEach(t=>{if(c[t.key]>mx){mx=c[t.key];win=t.key;}});
      await db.ref(`rounds/${rid}/result`).set(win);
      await db.ref('trophies/'+win).transaction(v=>(v||0)+1);
    }
    await db.ref('control/state').update({phase:'closed'});
  }
  async function resetAll(){
    for(let i=1;i<=5;i++) await db.ref('rounds/'+i).remove();
    const tr={};TEAMS.forEach(t=>tr[t.key]=0);
    await db.ref('trophies').set(tr);
    await db.ref('control/session').set(Date.now());   // ← 폰 투표 잠금 해제 신호
    await db.ref('control/state').set({phase:'idle',roundId:1,endTs:0});
  }
  document.getElementById('reset').onclick=()=>{ if(confirm('전체 초기화? (트로피·모든 표 삭제)')) resetAll(); };

  // 타이머 + 자동 마감
  setInterval(()=>{
    const el=document.getElementById('tmr'); if(!el)return;
    if(state.phase==='open'){
      const left=Math.max(0,Math.ceil((state.endTs-Date.now())/1000));
      el.textContent=left+'s'; el.style.color = left<=5?'#ff6b6b':'#fff';
      if(Date.now()>=state.endTs) closeRound();
    }else if(state.phase==='paused'){ const left=Math.max(0,Math.ceil((state.remaining||0)/1000)); el.textContent='⏸ '+left+'s'; el.style.color='#FFB020'; }
    else{ el.textContent='--'; el.style.color='#fff'; }
  },400);
}
</script>
</body>
</html>
