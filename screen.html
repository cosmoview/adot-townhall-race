.runner{position:absolute;left:0;bottom:0;width:8cqw;will-change:transform;z-index:2;transition:transform .3s cubic-bezier(.34,1.4,.64,1)}
.runner .sh{position:absolute;bottom:-.4cqh;left:50%;transform:translateX(-50%);width:6.6cqw;height:1.5cqh;background:radial-gradient(ellipse,rgba(0,0,0,.4),rgba(0,0,0,0) 70%)}
.runner .sp{width:100%;display:block;image-rendering:pixelated;transform-origin:bottom center}
.runner .crown{position:absolute;top:-2.4cqh;left:50%;transform:translateX(-50%);font-size:3cqw;opacity:0;transition:.3s;z-index:4}
.runner.lead .crown{opacity:1}
.runner.lead .sp{filter:drop-shadow(0 0 1cqw var(--gold))}
.runner.dim{filter:grayscale(.75) brightness(.55);opacity:.7}
.runner.winner{z-index:6}
.runner.winner .sp{filter:drop-shadow(0 0 2cqw var(--gold)) drop-shadow(0 0 3cqw var(--gold))}
.tag{position:absolute;top:-1.2cqh;left:50%;transform:translateX(-50%);white-space:nowrap;background:rgba(10,8,25,.82);border:.25cqw solid var(--c);border-radius:.8cqw;padding:.2cqw .7cqw;font-size:1.4cqw;font-weight:800;display:flex;align-items:center;gap:.5cqw;z-index:3}
.tag .v{color:var(--gold);font-weight:900}
.rankBadge{position:absolute;top:-3.4cqh;left:50%;transform:translateX(-50%);width:2.6cqw;height:2.6cqw;border-radius:50%;background:var(--gold);color:var(--ink);display:grid;place-items:center;font-size:1.4cqw;font-weight:900;box-shadow:0 .2cqw .6cqw rgba(0,0,0,.5);z-index:5}
.top{position:absolute;top:0;left:0;right:0;padding:2.4cqw 3cqw 0;z-index:8;pointer-events:none}
.qbox{max-width:40%}
.eyebrow{font-size:1.5cqw;color:var(--gold);text-shadow:.15cqw .15cqw 0 #000}
.q{font-size:2.8cqw;font-weight:900;line-height:1.16;margin-top:.9cqw;text-shadow:.2cqw .3cqw 0 rgba(0,0,0,.55),0 0 1cqw rgba(0,0,0,.5)}
.timer{position:absolute;top:1.8cqw;left:50%;transform:translateX(-50%);z-index:9;text-align:center;background:rgba(10,8,25,.72);border:.35cqw solid rgba(255,255,255,.18);padding:.55cqw 2.6cqw;border-radius:1.6cqw;display:none}
.timer.show{display:block}
.timer .n{font-size:6.6cqw;line-height:1;color:#fff;text-shadow:.25cqw .25cqw 0 #000;font-variant-numeric:tabular-nums}
.timer .l{font-size:1.2cqw;letter-spacing:.28em;opacity:.85;margin-top:0}
.timer.warn{border-color:#ff6b6b}
.timer.warn .n{color:#ff6b6b;animation:pulse .6s infinite}
@keyframes pulse{50%{transform:scale(1.09)}}
.trophies{position:absolute;top:2.4cqw;right:3cqw;display:flex;gap:.6cqw;z-index:8;flex-wrap:wrap;justify-content:flex-end;max-width:40cqw}
.tchip{display:flex;align-items:center;gap:.35cqw;background:rgba(10,8,25,.72);border:.22cqw solid var(--c);border-radius:.8cqw;padding:.3cqw .6cqw;font-size:1.3cqw;font-weight:800}
.tchip .dot{width:1.2cqw;height:1.2cqw;border-radius:.2cqw;background:var(--c)}
.tchip .cnt{color:var(--gold);font-weight:900}
.banner{position:absolute;inset:0;display:none;place-items:center;z-index:12;background:radial-gradient(circle at 50% 42%,rgba(10,8,25,.3),rgba(10,8,25,.88))}
.banner.show{display:grid}
.banner .card{text-align:center;animation:rise .5s ease}
@keyframes rise{from{transform:translateY(2cqw);opacity:0}}
.banner .kick{font-size:1.6cqw;color:var(--gold);letter-spacing:.06em}
.banner .big{font-size:8cqw;margin:.4cqw 0}
.banner .who{font-size:5.4cqw;font-weight:900}
.banner .sub{font-size:1.9cqw;font-weight:700;opacity:.9;margin-top:.6cqw;line-height:1.5}
.confetti{position:absolute;top:-4cqh;font-size:2.2cqw;pointer-events:none;z-index:11;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(115cqh) rotate(680deg);opacity:.85}}

const QUESTIONS=['신입사원 시절 가장 늦게까지 야근 했을 것 같은 임원은?','회식에서 끝까지 자리를 지킬 것 같은 임원은?','길에서 마주치면 커피 사주실 것 같은 임원은?','MZ 밈을 가장 잘 알아들을 것 같은 임원은?','무인도에 딱 한 명 데려간다면? 생존왕 임원은?'];
const N=TEAMS.length,START=0.11,FINISH=0.82,FRAME_MS=85;
const ROUND_SECONDS=45;
const stage=document.getElementById('stage'),banner=document.getElementById('banner'),bannerCard=document.getElementById('bannerCard');

// 러너/트로피 DOM
const runners=[],sps=[];
TEAMS.forEach((t,i)=>{const r=document.createElement('div');r.className='runner';r.style.setProperty('--c',t.color);r.style.bottom=t.bottom+'%';
  r.innerHTML=`<div class="rankBadge">–</div><div class="crown">👑</div><div class="tag"><span style="width:1cqw;height:1cqw;border-radius:.2cqw;background:${t.color}"></span>${t.name} <span class="v">0</span></div><img class="sp" src="${t.frames[0]}"><div class="sh"></div>`;
  r.querySelector('.sp').style.animationDelay=(i*0.09)+'s';stage.appendChild(r);runners.push(r);sps.push(r.querySelector('.sp'));});
TEAMS.forEach((t,i)=>{});

// 상태
let state={phase:'idle',roundId:1,endTs:0};
let counts=TEAMS.map(()=>0), cur=TEAMS.map(()=>0), trophies={};
let frameTimer=null,fN=0,curRound=null,votesRef=null;

// 레이스 렌더 루프
function targetFrac(i){const lead=Math.max(...counts,1);return Math.pow(counts[i]/lead,0.85);}
function frame(){const w=stage.clientWidth,half=0.04*w;
  const order=[...counts.keys()].sort((a,b)=>counts[b]-counts[a]),leadIdx=order[0];
  const moving=(state.phase==='open'||state.phase==='closed');
  runners.forEach((r,i)=>{const prog=moving?targetFrac(i):0;cur[i]+=(prog-cur[i])*0.1;
    r.style.transform=`translateX(${(START+cur[i]*(FINISH-START))*w-half}px)`;
    r.querySelector('.rankBadge').textContent=order.indexOf(i)+1;
    r.classList.toggle('lead',state.phase==='open'&&i===leadIdx&&counts[i]>0);});
  requestAnimationFrame(frame);}
frame();
function paintTags(){runners.forEach((r,i)=>r.querySelector('.v').textContent=counts[i]);}
function paintTrophies(){TEAMS.forEach((t,i)=>{const el=document.querySelector('[data-t="'+i+'"]');if(el)el.textContent=trophies[t.key]||0;});}
function startFrames(){if(frameTimer)return;frameTimer=setInterval(()=>{fN++;TEAMS.forEach((t,i)=>{sps[i].src=t.frames[fN%t.frames.length];});},FRAME_MS);}
function stopFrames(){clearInterval(frameTimer);frameTimer=null;TEAMS.forEach((t,i)=>sps[i].src=t.frames[0]);}
function updateQuestion(rid){document.getElementById('eyebrow').textContent=`ROUND ${rid} / 5`;document.getElementById('question').textContent=(state.phase==='finale'?'':(QUESTIONS[rid-1]||''));}
function winnerIdx(){let w=0,mx=-1;counts.forEach((v,i)=>{if(v>mx){mx=v;w=i;}});return w;}
function burst(){const e=['🎉','🎊','⭐','🏅','✨'];for(let i=0;i<24;i++){const s=document.createElement('span');s.className='confetti';s.textContent=e[i%e.length];s.style.left=Math.random()*100+'%';s.style.animationDuration=(1.4+Math.random()*1.5)+'s';s.style.animationDelay=(Math.random()*.4)+'s';stage.appendChild(s);setTimeout(()=>s.remove(),3200);}}

// Firebase 구독
function hookVotes(){
  if(curRound===state.roundId && votesRef) return;
  if(votesRef) votesRef.off();
  curRound=state.roundId;
  votesRef=db.ref('rounds/'+curRound+'/votes');
  votesRef.on('value',s=>{const obj=s.val()||{};const c={};TEAMS.forEach(t=>c[t.key]=0);
    Object.values(obj).forEach(k=>{if(k in c)c[k]++;});counts=TEAMS.map(t=>c[t.key]);paintTags();});
}
db.ref('control/state').on('value',s=>{const prev=state;state=s.val()||{phase:'idle',roundId:1,endTs:0};onState(prev);});
db.ref('trophies').on('value',s=>{trophies=s.val()||{};paintTrophies();});
// 연결 상태 표시
db.ref('.info/connected').on('value',s=>{document.getElementById('offline').style.display=s.val()?'none':'block';});

function setRacing(on){runners.forEach(r=>r.classList.toggle('racing',on));}
function onState(prev){
  hookVotes(); updateQuestion(state.roundId); updateHostControls();
  const p=state.phase;
  if(p==='open'){
    banner.classList.remove('show');
    runners.forEach(r=>r.classList.remove('winner','dim'));
    if(prev.phase!=='open'){cur=TEAMS.map(()=>0);}   // 새 라운드: 출발선 리셋
    startFrames(); setRacing(true);
  }else if(p==='closed'){
    stopFrames(); setRacing(false); showWinner();
  }else if(p==='finale'){
    stopFrames(); setRacing(false); showFinale();
  }else{ // idle
    stopFrames(); setRacing(false); cur=TEAMS.map(()=>0);
    runners.forEach(r=>r.classList.remove('winner','dim','lead'));
    showWaiting(state.roundId);
  }
}
function showWinner(){const w=winnerIdx();
  runners.forEach((r,i)=>{r.classList.toggle('winner',i===w);r.classList.toggle('dim',i!==w);});
  bannerCard.innerHTML=`<div class="kick pix">ROUND ${state.roundId} WINNER</div><div class="big">🏆</div><div class="who" style="color:${TEAMS[w].color}">${TEAMS[w].name}</div><div class="sub">${TEAMS[w].title} · ${counts[w]}표</div>`;
  banner.classList.add('show');burst();}
function showFinale(){
  let mx=-1;TEAMS.forEach(t=>{const v=trophies[t.key]||0;if(v>mx)mx=v;});
  const champs=[];TEAMS.forEach((t,i)=>{if((trophies[t.key]||0)===mx)champs.push(i);});
  runners.forEach((r,i)=>{const win=champs.includes(i);r.classList.toggle('winner',win);r.classList.toggle('dim',!win);});
  if(champs.length===1){
    const c=champs[0];
    bannerCard.innerHTML=`<div class="kick pix">SEASON CHAMPION · 🏆 ${mx}</div><div class="big">👑</div><div class="who" style="color:${TEAMS[c].color}">${TEAMS[c].name}</div><div class="sub">${TEAMS[c].title}</div>`;
  }else if(champs.length===TEAMS.length){
    bannerCard.innerHTML=`<div class="kick pix">ALL CHAMPIONS · 🏆 ${mx}</div><div class="big">🎉👑🎉</div><div class="who">전원 우승!</div><div class="sub">5명 모두 ${mx}회 우승 · 공동 챔피언 🏆</div>`;
  }else{
    const names=champs.map(i=>`<span style="color:${TEAMS[i].color}">${TEAMS[i].name}</span>`).join('<span style="opacity:.5"> · </span>');
    bannerCard.innerHTML=`<div class="kick pix">CO-CHAMPIONS · 🏆 ${mx}</div><div class="big">👑</div><div class="who" style="font-size:4cqw">${names}</div><div class="sub">공동 우승 · ${champs.length}명</div>`;
  }
  banner.classList.add('show');burst();setTimeout(burst,400);setTimeout(burst,800);}
function showWaiting(rid){
  bannerCard.innerHTML=`<div class="kick pix">GET READY</div><div class="big">🏁</div><div class="who">ROUND ${rid} 준비 중</div><div class="sub">호스트가 시작하면 출발!<br><span style="font-size:1.4cqw;opacity:.8">공유된 링크로 접속 후 대기해 주세요</span></div>`;
  banner.classList.add('show');}

/* ===== 발표 화면 자체 진행(호스트 컨트롤) ===== */
async function startRound(n){await db.ref('rounds/'+n).remove();await db.ref('control/state').set({phase:'open',roundId:n,endTs:Date.now()+ROUND_SECONDS*1000});}
async function closeRound(){const rid=state.roundId;const rs=await db.ref('rounds/'+rid+'/result').get();
  if(!rs.exists()){const vs=(await db.ref('rounds/'+rid+'/votes').get()).val()||{};const c={};TEAMS.forEach(t=>c[t.key]=0);Object.values(vs).forEach(k=>{if(k in c)c[k]++;});
    let w=TEAMS[0].key,mx=-1;TEAMS.forEach(t=>{if(c[t.key]>mx){mx=c[t.key];w=t.key;}});
    await db.ref('rounds/'+rid+'/result').set(w);await db.ref('trophies/'+w).transaction(v=>(v||0)+1);}
  await db.ref('control/state').update({phase:'closed'});}
async function resetAll(){for(let i=1;i<=5;i++)await db.ref('rounds/'+i).remove();const tr={};TEAMS.forEach(t=>tr[t.key]=0);await db.ref('trophies').set(tr);await db.ref('control/session').set(Date.now());await db.ref('control/state').set({phase:'idle',roundId:1,endTs:0});}
let hostPrimary=()=>{};
function updateHostControls(){const {phase,roundId}=state;const btn=document.getElementById('hostAct');if(!btn)return;btn.classList.toggle('stop',phase==='open');
  if(phase==='open'){btn.textContent='■ 지금 마감';hostPrimary=()=>closeRound();}
  else if(phase==='closed'){if(roundId>=5){btn.textContent='🏆 최종 결과 발표';hostPrimary=()=>db.ref('control/state').update({phase:'finale'});}else{btn.textContent='▶ ROUND '+(roundId+1)+' 시작';hostPrimary=()=>startRound(roundId+1);}}
  else if(phase==='finale'){btn.textContent='↻ 처음부터';hostPrimary=()=>resetAll();}
  else{btn.textContent='▶ ROUND '+(roundId||1)+' 시작';hostPrimary=()=>startRound(roundId||1);}
  btn.onclick=()=>hostPrimary();}
let barTO=null;
function showBar(){document.body.classList.add('showbar');clearTimeout(barTO);barTO=setTimeout(()=>document.body.classList.remove('showbar'),3500);}
window.addEventListener('mousemove',showBar);
window.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='Enter'||e.code==='ArrowRight'){e.preventDefault();showBar();hostPrimary();}
  else if(e.key==='r'||e.key==='R'){showBar();if(confirm('전체 초기화? (트로피·모든 표·투표 삭제)'))resetAll();}});
(function(){const rb=document.getElementById('hostReset');if(rb)rb.onclick=()=>{if(confirm('전체 초기화? (트로피·모든 표·투표 삭제)'))resetAll();};})();
updateHostControls();

// 타이머(endTs 동기화)
setInterval(()=>{const el=document.getElementById('timer'),box=document.getElementById('timerBox');if(!el||!box)return;
  if(state.phase==='open'){const left=Math.max(0,Math.ceil((state.endTs-Date.now())/1000));el.textContent=String(left).padStart(2,'0');
    box.classList.add('show');box.classList.toggle('warn',left<=5);
    if(Date.now()>=state.endTs) closeRound();}
  else{box.classList.remove('show','warn');el.textContent='--';}
},300);
</script></body></html>
